<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Sci-Calc</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">

    <div class="top-bar">
      <span>RETRO SCI-CAL</span>
      <span class="mode">RAD DEG</span>
    </div>

    <div class="display">
      <div class="angle">θ</div>
      <span class="value"></span>
    </div>

    <div class="buttons">
      <button class="brown">(</button>
      <button class="brown">)</button>
      <button class="brown">log</button>
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="green">+</button>
      <button class="light-green">AC</button>

      <button class="brown">sin</button>
      <button class="brown">cos</button>
      <button class="brown">tan</button>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="green">×</button>
      <button class="green">/</button>

      <button class="brown">xʸ</button>
      <button class="brown">√</button>
      <button class="brown">ln</button>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="green">−</button>
      <button class="green">−</button>

      <button class="brown">π</button>
      <button class="brown">πi</button>
      <button class="brown">e</button>
      <button class="long">0</button>
      <button>.</button>
      <button class="green">+</button>
      <button class="green">=</button>
    </div>
  </div>
</body>
</html>
